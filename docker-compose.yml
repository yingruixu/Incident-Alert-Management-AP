services:
  mysql:
    image: mysql:8.0
    container_name: incident-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: incidentdb
      MYSQL_USER: incident
      MYSQL_PASSWORD: incident
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - monitoring
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10
      start_period: 40s

  incident-api:
    build: .
    container_name: incident-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/incidentdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: incident
      SPRING_DATASOURCE_PASSWORD: incident
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - incident-api
    networks:
      - monitoring

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - monitoring

  frontend:
    build: ./frontend
    container_name: incident-frontend
    ports:
      - "3001:80"
    depends_on:
      - incident-api
    networks:
      - monitoring

volumes:
  mysql-data:

networks:
  monitoring:
    driver: bridge

